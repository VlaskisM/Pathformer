services:

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-04-06T05-26-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "echo >/dev/tcp/127.0.0.1/9000"]
      interval: 10s
      timeout: 5s
      retries: 10

  map-service:
    build:
      context: .
      dockerfile: map-service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      MINIO_HOST: minio
      MINIO_PORT: "9000"
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET_MAPS: maps
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      RABBITMQ_EXCHANGE: pathformer
    depends_on:
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  planner-service:
    build:
      context: .
      dockerfile: planner-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      MINIO_HOST: minio
      MINIO_PORT: "9000"
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET_MAPS: maps
      MINIO_BUCKET_VISUALS: visuals
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      RABBITMQ_EXCHANGE: pathformer
      WEIGHTS_PATH: /app/weights/best.pt
      MAX_CURRENT_GLOBAL: "3.0"
    volumes:
      - ./weights/best.pt:/app/weights/best.pt:ro
    depends_on:
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  minio_data:
